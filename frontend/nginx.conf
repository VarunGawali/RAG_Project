server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — unknown paths serve index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for the entry point so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Long-cache for versioned JS/CSS bundles (Vite content-hashes filenames)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
