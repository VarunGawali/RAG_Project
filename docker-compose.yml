# =============================================================================
# Contract360 — local Docker Compose
#
# Usage:
#   1. cp .env.example .env && fill in values
#   2. docker-compose up --build
#
# Backend:  http://localhost:8000
# Frontend: http://localhost:3000
# =============================================================================

version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override specific vars for local Docker testing
      USE_BLOB_ARTIFACTS: "true"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Points the React bundle at the local backend
        VITE_API_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
